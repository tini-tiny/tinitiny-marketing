<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: {{width}}px;
      height: {{height}}px;
      overflow: hidden;
      background: #FFFDF9;
    }
    .slide {
      width: {{width}}px;
      height: {{height}}px;
      position: relative;
      overflow: hidden;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Brand treatment: brightness +15%, contrast +4%, saturation -10% */
      filter: brightness(1.15) contrast(1.04) saturate(0.90);
    }
  </style>
</head>
<body>
  <div class="slide">
    <img src="{{photo}}" />
  </div>
</body>
</html>
